name: note週次チェック

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  check-note:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch note data
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          mkdir -p data reports
          curl -s "https://note.com/api/v2/creators/buleai_ibis" -o /tmp/profile.json
          curl -s "https://note.com/api/v2/creators/buleai_ibis/contents?kind=note&page=1" -o /tmp/articles.json

      - name: Process and save data
        run: python3 .github/scripts/note_check.py
        env:
          TODAY: ${{ env.TODAY }}

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/ reports/
          git commit -m "weekly note check: $TODAY" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
