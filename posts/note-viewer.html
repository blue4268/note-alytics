<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note記事ビューワー</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh}

.top-header{background:#fff;border-bottom:1px solid #e5e5ea;padding:18px 20px 14px}
.top-header h1{font-size:17px;font-weight:700}
.top-header .meta{font-size:12px;color:#8e8e93;margin-top:2px}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.s-chip{border-radius:10px;padding:8px 12px;min-width:76px}
.s-chip-default{background:#f2f2f7}
.s-chip-free{background:#dcfce7}
.s-chip-paid{background:#fff3cd}
.s-chip-editor{background:#d1ecf1}
.s-label{font-size:11px;color:#6c6c70;margin-bottom:2px}
.s-value{font-size:20px;font-weight:700;line-height:1}
.s-sub{font-size:11px;color:#6c6c70;margin-top:2px}

.controls{background:#fff;border-bottom:1px solid #e5e5ea;padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 #e5e5ea}
.search-wrap{flex:1;min-width:140px}
.search-wrap input{width:100%;padding:8px 11px;border:1px solid #e5e5ea;border-radius:9px;font-size:14px;outline:none;font-family:inherit;background:#f9f9f9}
.search-wrap input:focus{border-color:#007aff;background:#fff}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.f-btn{padding:5px 12px;border:1px solid #e5e5ea;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;line-height:1.4}
.f-btn:hover{background:#f2f2f7}
.f-btn.on{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.tag-filters{width:100%;display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px dashed #e5e5ea}
.tag-f-btn{padding:5px 12px;border:1px solid #f3d1e3;border-radius:20px;background:#fff;color:#9d174d;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;line-height:1.4}
.tag-f-btn:hover{background:#fdf2f8}
.tag-f-btn.on{background:#9d174d;color:#fff;border-color:#9d174d}

.cards-wrap{padding:16px 14px;max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card[data-hidden]{display:none}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.card-meta-top{display:flex;flex-direction:column;gap:2px}
.card-num{font-size:12px;color:#8e8e93}
.card-batch{font-size:11px;color:#aeaeb2}
.card-title{font-size:17px;font-weight:700;margin-top:6px;line-height:1.5}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;padding:3px 7px;border-radius:5px;font-weight:500;white-space:nowrap}
.badge-type-free{background:#dcfce7;color:#15803d}
.badge-type-paid{background:#fff3cd;color:#92670a}
.badge-editor{background:#cfe2ff;color:#084298}
.badge-review{background:#fee2e2;color:#b91c1c}
.badge-tag{background:#fce7f3;color:#9d174d}

.conclusion{font-size:14px;line-height:1.8;color:#3a3a3c;background:#f9f9f9;border-radius:10px;padding:12px 14px;margin:10px 0}
.conclusion .label{font-size:11px;color:#8e8e93;font-weight:600;margin-bottom:4px}

.title-list{margin:10px 0}
.title-list .label{font-size:11px;color:#8e8e93;font-weight:600;margin-bottom:4px}
.title-list ol{padding-left:18px;font-size:13px;line-height:1.9;color:#3a3a3c}

.structure-list{margin:10px 0}
.structure-item{border-left:2px solid #e5e5ea;padding:2px 0 2px 10px;margin-bottom:8px}
.structure-item .h{font-size:13px;font-weight:600;color:#1c1c1e}
.structure-item .s{font-size:12px;color:#6c6c70;margin-top:2px}

.note-textarea{width:100%;min-height:280px;border:1px solid #e5e5ea;border-radius:10px;padding:14px;font-size:15px;line-height:1.9;font-family:inherit;color:#1c1c1e;background:#fafafa;resize:vertical;margin:10px 0 14px;box-sizing:border-box}
.note-textarea:focus{outline:none;border-color:#007aff;background:#fff}

.takeaway-box{background:#eff6ff;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:13px;line-height:1.8;color:#1e3a8a}
.takeaway-box .label{font-size:11px;color:#2563eb;font-weight:600;margin-bottom:4px}

.snippet{background:#faf5ff;border:1px solid #e9d5ff;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.7;color:#3a3a3c;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.snippet-text{flex:1}
.snippet-copy{padding:5px 11px;background:#7c3aed;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:background .2s}
.snippet-copy:hover{background:#6d28d9}
.snippet-copy.ok{background:#34c759}

.card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}
.copy-btn{padding:7px 15px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .2s;white-space:nowrap;font-weight:500}
.copy-btn:hover{background:#0071e3}
.copy-btn.ok{background:#34c759}
.status-group{display:flex;gap:4px;margin-left:auto}
.st-btn{padding:5px 10px;border:1px solid #e5e5ea;border-radius:7px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.st-btn:hover{background:#f2f2f7}
.st-btn.on-採用{background:#34c759;color:#fff;border-color:#34c759}
.st-btn.on-修正{background:#ff9500;color:#fff;border-color:#ff9500}
.st-btn.on-保留{background:#8e8e93;color:#fff;border-color:#8e8e93}

.card-details{margin-top:10px;border-top:1px solid #f2f2f7;padding-top:10px}
details summary{font-size:12px;color:#8e8e93;cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:5px;padding:2px 0}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▶";font-size:9px;display:inline-block;transition:transform .15s;color:#c7c7cc}
details[open] summary::before{transform:rotate(90deg)}
.meta-body{padding-top:8px;font-size:13px;line-height:1.7;color:#3a3a3c}
.meta-label{font-size:11px;color:#8e8e93;margin-bottom:2px;margin-top:8px;font-weight:600;letter-spacing:.2px}
.meta-label:first-child{margin-top:0}

.empty{text-align:center;padding:60px 20px;color:#8e8e93;font-size:14px;display:none}

@media(max-width:600px){
  .top-header{padding:13px 14px 11px}
  .controls{padding:9px 12px}
  .cards-wrap{padding:12px 10px;gap:10px}
  .card{padding:14px}
  .card-title{font-size:15.5px}
  .s-value{font-size:17px}
}
</style>
</head>

    structure: [

      { h: '2. 言い回しを工夫しては消耗していた頃の話', s: 'プロンプトの言葉遊びだけで消耗していた時期の体験' },

      { h: '4. 今、頼む前に渡しているもの', s: '役割・前提・判断基準を先に渡す具体的なやり方' },
      { h: '5. これは技術論では終わらない、という話', s: 'プロンプトの型はコモディティ化する、判断基準は模倣しにくいという視座' },
      { h: '6. 完成してから見せようとしていたら、一生見せられなかった', s: '判断基準も最初から綺麗だったわけではないという話' },
      { h: '7. 今日から試せる小さな一歩', s: '役割・前提・判断基準を一行ずつ書き出す提案' },
      { h: '8. おわりに', s: 'まとめと軽い導線' },
    ],
    body: `### 「プロンプトを磨くのをやめた日」を読んでくれた人へ

先日Xで、こんな投稿をした。

「プロンプトを100個磨くより、渡す情報を1個変えた方が結果が変わった。これに気づくまで、けっこう遠回りした。」

思ったより反応をもらえて、正直少し驚いた。同じところで足踏みしている人は、自分が思っていた以上に多いようだった。今回はこの投稿の続きとして、実際に何が変わったのか、なぜそれが機能するのかを、もう少し詳しく書いておきたい。

### 言い回しを工夫しては消耗していた頃の話

AIを使い始めた頃、自分はずっと言い回しを工夫していた。「もっと詳しく」「プロっぽく」「簡潔に」。言葉を変えるたびに出力は変わる。でも狙った方向には進まない。

出てきたものが微妙だと、また言葉を変える。「今度はビジネスライクに」「もう少しカジュアルに」。試行回数だけは増えていくのに、精度が上がっている感じがしない。むしろ、微妙な成果物を量産していた時期の方が長かった。

リサーチも構成も執筆も添削も、当時は同じAIに丸投げしていた。一つの会話の中で全部やらせて、うまくいかない部分だけ言い回しで修正しようとしていた。今振り返ると、そもそも入り口の設計がおかしかった。

### 気づいたきっかけ：役割を分けてみたら、何が足りないかが見えた

きっかけは、AIに仕事を任せる役割を分けてみたことだった。リサーチ担当、構成担当、執筆担当、添削担当。それぞれに別の役割を与えて動かしてみたら、精度がはっきり変わった。

一人に全部任せていたときとの違いを考えて気づいたのは、AIが迷っていたのは言い回しではなく、前提が足りていなかったということだった。

役割は何か。判断基準は何か。今どんな情報を渡されていて、何を渡されていないのか。ここが曖昧なままだと、言葉をどれだけ磨いても出力はブレる。逆に言えば、ここさえ渡せば、言い回しはそこまで神経質にならなくていい。

副業を続けてきて、気づけば累計の売上は3000万円を超えていたけれど、その過程で似た感覚を持ったことがある。外注先やチームに仕事を振るとき、指示が曖昧だと、どれだけ優秀な相手でも成果物がずれる。反対に、役割と判断基準さえはっきりしていれば、細かい言い回しを指定しなくても、狙った方向に近いものが返ってくる。一番学んだのは、この感覚だったかもしれない。AIに対しても、同じことが起きていた。

### 今、頼む前に渡しているもの

具体的には、今は言葉を工夫する前に、次の3つを先に渡すようにしている。

一つ目は役割。今回のAIに何担当をやってもらうのか。リサーチなのか、構成なのか、判断や添削なのか。

二つ目は前提。何を知っていて、何を知らない状態から始めるのか。読者は誰で、目的は何で、すでに何が決まっているのか。

三つ目は判断基準。何を優先するのか、何を避けたいのか、どこまでは任せて、どこからは自分で決めるのか。

この3つを決めてから頼むと、一度で欲しい方向の答えが返ってくることが増えた。プロンプトが下手だったわけではなく、渡す情報の設計ができていなかっただけだった。

### これは技術論では終わらない、という話

ここまでは、プロンプトの話として読める内容だ。でも、自分が本当に言いたいのはその先にある。

役割と前提と判断基準を渡す、という作業の本質は、AIに何をどこまで任せるかを自分で決める作業だ。これはプロンプトの型を覚えれば済む話ではない。何を任せて安全で、何を任せると危ういのか。その線引きを自分の頭で持っているかどうかの話になる。

正直、AIツールの使い方や便利なプロンプト集は、この先どんどん共有されて当たり前になっていくだろう。誰かが見つけたコツは、すぐに広まる。差がつかなくなる。

一方で、何をAIに任せて、何を自分で判断するかという基準は、簡単にはコピーできない。ここは経験と失敗を積み重ねないと育たない部分だと思う。これから価値を持つのは、AIに詳しい人よりも、AIに何を安心して任せられるかを自分で定義できる人だ。今のところはまだ、自分の中の仮説でしかないけれど。

### 完成してから見せようとしていたら、一生見せられなかった

こういう判断基準は、最初から綺麗な形で持てるものではなかった。

AIに仕事を任せる仕組みを作っている間、ずっと「まだ粗いから見せられない」と思っていた。役割分担も、前提の渡し方も、最初のうちは間違いだらけだった。ある担当に任せすぎて成果物が薄くなったり、逆に細かく指示しすぎて身動きが取れなくなったり。

それでも、実際に動かして失敗を晒した方が、直すスピードは早かった。完成を待っていたら、たぶんまだ何も見せられていない。今は8割できた時点で一度出すようにしている。この記事も、その延長線上にある。まだ整理し切れていない部分がある前提で書いている。

### 今日から試せる小さな一歩

長く書いたけれど、今日からできることはシンプルにしておきたい。

次にAIに何かを頼むとき、言い回しを工夫する前に、役割、前提、判断基準の3つを一行ずつでいいので書き出してみてほしい。役割は何か。相手はすでに何を知っているか。何を優先してほしいか。

この3つを渡すだけで、出力が変わることに気づくはずだ。変わらなかったとしても、それは失敗ではなく、自分の中の判断基準がまだ曖昧だったという発見になる。

### おわりに

プロンプトを磨くことに時間を使うより、何を、どこまで、どんな前提で任せるかを決めることの方が、結果を左右する。そしてその判断基準を自分で持てるかどうかが、この先のAIとの付き合い方を分けていく。

役割ごとにAIを分けて動かす具体的なやり方や、判断基準の作り方をもう少し体系立てて整理したものは、また改めて形にできたら出そうと思う。今回はまず、考え方の部分だけを置いておきたかった。

もし同じように「プロンプトを工夫しても結果が安定しない」と感じているなら、今使っているプロンプトに、役割と前提と判断基準がちゃんと乗っているか、一度確認してみてほしい。`,
    reader: 'ChatGPTやClaudeを触ったことはあるが、プロンプトの言い回しばかり工夫していて成果が安定しない会社員。副業やAI活用に関心はあるが、AIに何をどこまで任せていいかの判断基準を持てず、結局自分でやり直してしまう人。',
    intent: 'X投稿（id45スレッド、id43、id44）からの着地記事。常識破壊ポジショニングの深掘り版であり、上位ポジショニング「AI時代に何を安心して任せられるかを定義する人」を自然に届ける役割を持つ。',
    takeaways: [

      'AIに頼む前に、役割・前提・判断基準の3つを渡すと、出力の精度が上がる',

    ],
    snippets: [

  //   ],
  //   snippets: [
  //     'プロンプトを100個磨くより、渡す情報を1個変えた方が結果が変わった。',
  //     'AIが迷っているのは言い回しじゃなく、前提が足りないからだった。',
  //   ],
  //   editorCheck: false,
  //   reviewRequired: false,
  // },
];

// ─── ステータス永続化 ──────────────────────────────────────
const STORAGE_KEY = 'note_statuses_v1';
function loadStatuses() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveStatuses(obj) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch {}
}
let statuses = loadStatuses();

// ─── サマリー ──────────────────────────────────────────────
function renderHeader() {
  var total = NOTES.length;
  var freeCount = NOTES.filter(function(n) { return n.articleType === '無料note'; }).length;
  var paidCount = NOTES.filter(function(n) { return n.articleType === '有料note'; }).length;
  var editorCount = NOTES.filter(function(n) { return n.editorCheck; }).length;
  var batches = Array.from(new Set(NOTES.map(function(n) { return n.batch; })));

  document.getElementById('headerMeta').textContent = '全' + batches.length + 'バッチ';

  var row = document.getElementById('summaryRow');
  row.innerHTML =
    '<div class="s-chip s-chip-default">' +
      '<div class="s-label">記事総数</div>' +
      '<div class="s-value">' + total + '</div>' +
      '<div class="s-sub">本</div>' +
    '</div>' +
    (freeCount > 0
      ? '<div class="s-chip s-chip-free">' +
          '<div class="s-label">無料note</div>' +
          '<div class="s-value">' + freeCount + '</div>' +
          '<div class="s-sub">本</div>' +
        '</div>'
      : '') +
    (paidCount > 0
      ? '<div class="s-chip s-chip-paid">' +
          '<div class="s-label">有料note</div>' +
          '<div class="s-value">' + paidCount + '</div>' +
          '<div class="s-sub">本</div>' +
        '</div>'
      : '') +
    (editorCount > 0
      ? '<div class="s-chip s-chip-editor">' +
          '<div class="s-label">editor確認推奨</div>' +
          '<div class="s-value">' + editorCount + '</div>' +
          '<div class="s-sub">本</div>' +
        '</div>'
      : '');
}

// ─── フィルター ────────────────────────────────────────────
var activeFilter = 'すべて';
var activeTag = 'すべて';
function getTypes() {
  return ['すべて', ...Array.from(new Set(NOTES.map(function(n) { return n.articleType; })))];
}
function getTags() {
  var all = [];
  NOTES.forEach(function(n) { (n.tags || []).forEach(function(t) { all.push(t); }); });
  return Array.from(new Set(all));
}
function renderFilters() {
  var wrap = document.getElementById('filterBtns');
  wrap.innerHTML = getTypes().map(function(c) {
    return '<button class="f-btn ' + (c === activeFilter ? 'on' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
  }).join('');
  wrap.querySelectorAll('.f-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeFilter = this.dataset.cat;
      renderFilters();
      applyFilter();
    });
  });
}
function renderTagFilters() {
  var tags = getTags();
  var wrap = document.getElementById('tagFilterBtns');
  if (tags.length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = ['すべて'].concat(tags).map(function(t) {
    return '<button class="tag-f-btn ' + (t === activeTag ? 'on' : '') + '" data-tag="' + esc(t) + '">' + (t === 'すべて' ? 'タグ: すべて' : '#' + esc(t)) + '</button>';
  }).join('');
  wrap.querySelectorAll('.tag-f-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeTag = this.dataset.tag;
      renderTagFilters();
      applyFilter();
    });
  });
}

// ─── 絞り込み ──────────────────────────────────────────────
function applyFilter() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var typeMatch = activeFilter === 'すべて' || card.dataset.type === activeFilter;
    var tagList = card.dataset.tags ? card.dataset.tags.split(',') : [];
    var tagMatch = activeTag === 'すべて' || tagList.indexOf(activeTag) !== -1;
    var textMatch = !q || card.dataset.searchtext.indexOf(q) !== -1;
    if (typeMatch && tagMatch && textMatch) { card.removeAttribute('data-hidden'); visible++; }
    else { card.setAttribute('data-hidden', ''); }
  });
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
}

// ─── カード描画 ────────────────────────────────────────────
function renderCards() {
  var wrap = document.getElementById('cardsWrap');
  var existing = wrap.querySelectorAll('.card');
  existing.forEach(function(c) { c.remove(); });

  NOTES.forEach(function(note) {
    var status = statuses[note.id] || '';
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.type = note.articleType;
    card.dataset.tags = (note.tags || []).join(',');
    card.dataset.searchtext = (
      (note.batch || '') + ' ' +
      (note.articleType || '') + ' ' +
      (note.tags || []).join(' ') + ' ' +
      (note.titles || []).join(' ') + ' ' +
      (note.conclusion || '') + ' ' +
      (note.body || '') + ' ' +
      (note.reader || '') + ' ' +
      (note.intent || '')
    ).toLowerCase();

    var typeBadgeClass = note.articleType === '有料note' ? 'badge-type-paid' : 'badge-type-free';
    var badges =
      '<span class="badge ' + typeBadgeClass + '">' + esc(note.articleType || '') + '</span>' +
      (note.tags || []).map(function(t) { return '<span class="badge badge-tag">#' + esc(t) + '</span>'; }).join('') +
      (note.editorCheck ? '<span class="badge badge-editor">editor確認推奨</span>' : '') +
      (note.reviewRequired ? '<span class="badge badge-review">要確認・未公開</span>' : '');

    var stBtns = ['採用', '修正', '保留'].map(function(s) {
      return '<button class="st-btn ' + (status === s ? 'on-' + s : '') + '" data-id="' + note.id + '" data-status="' + s + '">' + s + '</button>';
    }).join('');

    var titlesHtml = (note.titles && note.titles.length)
      ? '<div class="title-list"><div class="label">タイトル案</div><ol>' +
          note.titles.map(function(t) { return '<li>' + esc(t) + '</li>'; }).join('') +
        '</ol></div>'
      : '';

    var conclusionHtml = note.conclusion
      ? '<div class="conclusion"><div class="label">記事の結論</div>' + esc(note.conclusion) + '</div>'
      : '';

    var structureHtml = (note.structure && note.structure.length)
      ? '<div class="structure-list">' +
          note.structure.map(function(s) {
            return '<div class="structure-item"><div class="h">' + esc(s.h) + '</div><div class="s">' + esc(s.s || '') + '</div></div>';
          }).join('') +
        '</div>'
      : '';

    var bodyHtml = '<textarea class="note-textarea" id="body-' + note.id + '" readonly>' + esc(note.body || '') + '</textarea>';

    var takeawaysHtml = (note.takeaways && note.takeaways.length)
      ? '<div class="takeaway-box"><div class="label">読者が持ち帰る学び</div>' +
          note.takeaways.map(function(t) { return '・' + esc(t); }).join('<br>') +
        '</div>'
      : '';

    var snippetsHtml = (note.snippets && note.snippets.length)
      ? '<div class="card-details"><details><summary>SNS切り抜き用フレーズを見る</summary><div class="meta-body">' +
          note.snippets.map(function(s, i) {
            return '<div class="snippet"><div class="snippet-text">' + esc(s) + '</div>' +
              '<button class="snippet-copy" data-id="' + note.id + '" data-idx="' + i + '">コピー</button></div>';
          }).join('') +
        '</div></details></div>'
      : '';

    card.innerHTML =
      '<div class="card-top">' +
        '<div class="card-meta-top">' +
          '<span class="card-num">記事' + note.id + '</span>' +
          '<span class="card-batch">' + esc(note.batch || '') + '</span>' +
        '</div>' +
        '<div class="card-badges">' + badges + '</div>' +
      '</div>' +
      (note.titles && note.titles.length ? '<div class="card-title">' + esc(note.titles[0]) + '</div>' : '') +
      titlesHtml +
      conclusionHtml +
      structureHtml +
      bodyHtml +
      takeawaysHtml +
      '<div class="card-footer">' +
        '<button class="copy-btn" data-id="' + note.id + '">本文をコピー</button>' +
        '<div class="status-group">' + stBtns + '</div>' +
      '</div>' +
      '<div class="card-details">' +
        '<details>' +
          '<summary>想定読者・狙いを見る</summary>' +
          '<div class="meta-body">' +
            '<div class="meta-label">想定読者</div>' +
            '<div>' + esc(note.reader || '') + '</div>' +
            '<div class="meta-label">狙い</div>' +
            '<div>' + esc(note.intent || '') + '</div>' +
          '</div>' +
        '</details>' +
      '</div>' +
      snippetsHtml;

    wrap.insertBefore(card, document.getElementById('emptyState'));
  });

  // 本文コピー
  document.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var note = NOTES.find(function(n) { return n.id === +btn.dataset.id; });
      var doFallback = function() {
        var ta = document.createElement('textarea');
        ta.value = note.body || '';
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      };
      var showOk = function() {
        btn.textContent = 'コピーしました ✓';
        btn.classList.add('ok');
        setTimeout(function() { btn.textContent = '本文をコピー'; btn.classList.remove('ok'); }, 2000);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(note.body || '').then(showOk).catch(function() { doFallback(); showOk(); });
      } else { doFallback(); showOk(); }
    });
  });

  // スニペットコピー
  document.querySelectorAll('.snippet-copy').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var note = NOTES.find(function(n) { return n.id === +btn.dataset.id; });
      var text = note.snippets[+btn.dataset.idx];
      var doFallback = function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      };
      var showOk = function() {
        btn.textContent = 'コピーしました ✓';
        btn.classList.add('ok');
        setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('ok'); }, 2000);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(showOk).catch(function() { doFallback(); showOk(); });
      } else { doFallback(); showOk(); }
    });
  });

  // ステータス
  document.querySelectorAll('.st-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = +btn.dataset.id;
      var s = btn.dataset.status;
      if (statuses[id] === s) { delete statuses[id]; } else { statuses[id] = s; }
      saveStatuses(statuses);
      btn.closest('.status-group').querySelectorAll('.st-btn').forEach(function(b) {
        b.className = 'st-btn' + (statuses[id] === b.dataset.status ? ' on-' + b.dataset.status : '');
      });
    });
  });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── 初期化 ────────────────────────────────────────────────
renderHeader();
renderCards();
renderFilters();
renderTagFilters();
document.getElementById('searchInput').addEventListener('input', applyFilter);
</script>
</body>
</html>
