<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X投稿ビューワー</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh}

.top-header{background:#fff;border-bottom:1px solid #e5e5ea;padding:18px 20px 14px}
.top-header h1{font-size:17px;font-weight:700}
.top-header .meta{font-size:12px;color:#8e8e93;margin-top:2px}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.s-chip{border-radius:10px;padding:8px 12px;min-width:76px}
.s-chip-default{background:#f2f2f7}
.s-chip-note{background:#fff3cd}
.s-chip-editor{background:#d1ecf1}
.s-label{font-size:11px;color:#6c6c70;margin-bottom:2px}
.s-value{font-size:20px;font-weight:700;line-height:1}
.s-sub{font-size:11px;color:#6c6c70;margin-top:2px}
.s-cat-text{font-size:12px;font-weight:600;line-height:1.6;margin-top:2px}

.controls{background:#fff;border-bottom:1px solid #e5e5ea;padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 #e5e5ea}
.search-wrap{flex:1;min-width:140px}
.search-wrap input{width:100%;padding:8px 11px;border:1px solid #e5e5ea;border-radius:9px;font-size:14px;outline:none;font-family:inherit;background:#f9f9f9}
.search-wrap input:focus{border-color:#007aff;background:#fff}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.f-btn{padding:5px 12px;border:1px solid #e5e5ea;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;line-height:1.4}
.f-btn:hover{background:#f2f2f7}
.f-btn.on{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.sort-btn{padding:5px 12px;border:1px solid #2563EB;border-radius:20px;background:#fff;color:#2563EB;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;line-height:1.4;font-weight:500}
.sort-btn:hover{background:#EFF6FF}
.sort-btn.on{background:#2563EB;color:#fff}

.cards-wrap{padding:16px 14px;max-width:740px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card[data-hidden]{display:none}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.card-meta-top{display:flex;flex-direction:column;gap:2px}
.card-num{font-size:12px;color:#8e8e93}
.card-batch{font-size:11px;color:#aeaeb2}
.card-scheduled{font-size:12px;color:#2563EB;font-weight:600;margin-top:1px}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;padding:3px 7px;border-radius:5px;font-weight:500;white-space:nowrap}
.badge-cat{background:#f2f2f7;color:#3a3a3c}
.badge-note{background:#fff3cd;color:#92670a}
.badge-editor{background:#cfe2ff;color:#084298}
.badge-format{background:#e9d5ff;color:#6b21a8}
.badge-review{background:#fee2e2;color:#b91c1c}
.badge-typefully{background:#dcfce7;color:#15803d}

.card-text{font-size:16px;line-height:1.9;white-space:pre-wrap;margin:10px 0 14px;word-break:break-word;color:#1c1c1e}

.card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.copy-btn{padding:7px 15px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .2s;white-space:nowrap;font-weight:500}
.copy-btn:hover{background:#0071e3}
.copy-btn.ok{background:#34c759}
.status-group{display:flex;gap:4px;margin-left:auto}
.st-btn{padding:5px 10px;border:1px solid #e5e5ea;border-radius:7px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.st-btn:hover{background:#f2f2f7}
.st-btn.on-採用{background:#34c759;color:#fff;border-color:#34c759}
.st-btn.on-修正{background:#ff9500;color:#fff;border-color:#ff9500}
.st-btn.on-保留{background:#8e8e93;color:#fff;border-color:#8e8e93}

.card-details{margin-top:10px;border-top:1px solid #f2f2f7;padding-top:10px}
details summary{font-size:12px;color:#8e8e93;cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:5px;padding:2px 0}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▶";font-size:9px;display:inline-block;transition:transform .15s;color:#c7c7cc}
details[open] summary::before{transform:rotate(90deg)}
.meta-body{padding-top:8px;font-size:13px;line-height:1.7;color:#3a3a3c}
.meta-label{font-size:11px;color:#8e8e93;margin-bottom:2px;margin-top:8px;font-weight:600;letter-spacing:.2px}
.meta-label:first-child{margin-top:0}

.img-prompt-section{margin-top:10px;border-top:1px solid #f2f2f7;padding-top:10px}
.img-prompt-section summary{font-size:12px;color:#6b21a8;cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:5px;padding:2px 0;font-weight:600}
.img-prompt-section summary::-webkit-details-marker{display:none}
.img-prompt-section summary::before{content:"▶";font-size:9px;display:inline-block;transition:transform .15s;color:#a855f7}
.img-prompt-section[open] summary::before{transform:rotate(90deg)}
.img-prompt-body{padding-top:8px}
.img-prompt-text{width:100%;background:#faf5ff;border:1px solid #e9d5ff;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;color:#3a3a3c;white-space:pre-wrap;font-family:inherit;resize:vertical;min-height:120px;box-sizing:border-box}
.img-prompt-text:focus{outline:none;border-color:#a855f7}
.img-copy-btn{margin-top:6px;padding:6px 14px;background:#7c3aed;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .2s}
.img-copy-btn:hover{background:#6d28d9}
.img-copy-btn.ok{background:#34c759}

.empty{text-align:center;padding:60px 20px;color:#8e8e93;font-size:14px;display:none}
.note-textarea{width:100%;min-height:320px;border:1px solid #e5e5ea;border-radius:10px;padding:14px;font-size:15px;line-height:1.9;font-family:inherit;color:#1c1c1e;background:#fafafa;resize:vertical;margin:10px 0 14px;box-sizing:border-box}
.note-textarea:focus{outline:none;border-color:#007aff;background:#fff}
.note-select-btn{padding:7px 15px;background:#5856d6;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:background .2s}
.note-select-btn:hover{background:#4845c7}

@media(max-width:600px){
  .top-header{padding:13px 14px 11px}
  .controls{padding:9px 12px}
  .cards-wrap{padding:12px 10px;gap:10px}
  .card{padding:14px}
  .card-text{font-size:15px;line-height:1.85}
  .s-value{font-size:17px}
}
</style>
</head>
<body>

<div class="top-header">
  <h1>X投稿ビューワー</h1>
  <div class="meta" id="headerMeta"></div>
  <div class="summary-row" id="summaryRow"></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="キーワード検索...">
  </div>
  <div class="filters" id="filterBtns"></div>
  <button class="sort-btn" id="sortBtn">🕐 時刻順</button>
</div>

<div class="cards-wrap" id="cardsWrap">
  <div class="empty" id="emptyState">該当する投稿がありません</div>
</div>

// ─── ステータス永続化 ──────────────────────────────────────
const STORAGE_KEY = 'x_post_statuses_v1';
function loadStatuses() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveStatuses(obj) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch {}
}
let statuses = loadStatuses();

// ─── ソート ────────────────────────────────────────────────
let sortByTime = false;

function getSortedPosts() {
  if (!sortByTime) return POSTS;
  return [...POSTS].sort(function(a, b) {
    if (!a.scheduledAt && !b.scheduledAt) return 0;
    if (!a.scheduledAt) return 1;
    if (!b.scheduledAt) return -1;
    return new Date(a.scheduledAt) - new Date(b.scheduledAt);
  });
}

// ─── サマリー ──────────────────────────────────────────────
function renderHeader() {
  var total = POSTS.length;
  var noteCount = POSTS.filter(function(p) { return p.noteExpandable; }).length;
  var editorCount = POSTS.filter(function(p) { return p.editorCheck; }).length;
  var scheduledCount = POSTS.filter(function(p) { return p.scheduledAt; }).length;
  var catCounts = {};
  POSTS.forEach(function(p) { catCounts[p.category] = (catCounts[p.category] || 0) + 1; });
  var catText = Object.entries(catCounts).map(function(e) { return e[0] + '&nbsp;' + e[1] + '本'; }).join('&ensp;/&ensp;');
  var batches = Array.from(new Set(POSTS.map(function(p) { return p.batch; })));

  document.getElementById('headerMeta').textContent = '全' + batches.length + 'バッチ';

  var row = document.getElementById('summaryRow');
  row.innerHTML =
    '<div class="s-chip s-chip-default">' +
      '<div class="s-label">投稿総数</div>' +
      '<div class="s-value">' + total + '</div>' +
      '<div class="s-sub">本</div>' +
    '</div>' +
    '<div class="s-chip s-chip-default">' +
      '<div class="s-label">予約済み</div>' +
      '<div class="s-value">' + scheduledCount + '</div>' +
      '<div class="s-sub">本</div>' +
    '</div>' +
    '<div class="s-chip s-chip-default" style="min-width:auto">' +
      '<div class="s-label">分類</div>' +
      '<div class="s-cat-text">' + catText + '</div>' +
    '</div>' +
    (noteCount > 0
      ? '<div class="s-chip s-chip-note">' +
          '<div class="s-label">note展開候補</div>' +
          '<div class="s-value">' + noteCount + '</div>' +
          '<div class="s-sub">本</div>' +
        '</div>'
      : '') +
    (editorCount > 0
      ? '<div class="s-chip s-chip-editor">' +
          '<div class="s-label">editor確認推奨</div>' +
          '<div class="s-value">' + editorCount + '</div>' +
          '<div class="s-sub">本</div>' +
        '</div>'
      : '');
}

// ─── フィルター ────────────────────────────────────────────
var activeFilter = 'すべて';
function getCategories() {
  return ['すべて', ...Array.from(new Set(POSTS.map(function(p) { return p.category; })))];
}
function renderFilters() {
  var wrap = document.getElementById('filterBtns');
  wrap.innerHTML = getCategories().map(function(c) {
    return '<button class="f-btn ' + (c === activeFilter ? 'on' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
  }).join('');
  wrap.querySelectorAll('.f-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeFilter = this.dataset.cat;
      renderFilters();
      applyFilter();
    });
  });
}

// ─── 絞り込み ──────────────────────────────────────────────
function applyFilter() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var catMatch = activeFilter === 'すべて' || card.dataset.category === activeFilter;
    var textMatch = !q || card.dataset.searchtext.indexOf(q) !== -1;
    if (catMatch && textMatch) { card.removeAttribute('data-hidden'); visible++; }
    else { card.setAttribute('data-hidden', ''); }
  });
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
}

// ─── カード描画 ────────────────────────────────────────────
function renderCards() {
  var wrap = document.getElementById('cardsWrap');
  // 既存カードを削除（emptyState以外）
  var existing = wrap.querySelectorAll('.card');
  existing.forEach(function(c) { c.remove(); });

  getSortedPosts().forEach(function(post) {
    var status = statuses[post.id] || '';
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.category = post.category;
    card.dataset.searchtext = (
      (post.batch || '') + ' ' +
      (post.category || '') + ' ' +
      (post.text || '') + ' ' +
      (post.reader || '') + ' ' +
      (post.intent || '') + ' ' +
      (post.scheduledLabel || '')
    ).toLowerCase();

    var badges =
      '<span class="badge badge-cat">' + esc(post.category) + '</span>' +
      (post.format ? '<span class="badge badge-format">' + esc(post.format) + '</span>' : '') +
      (post.noteExpandable ? '<span class="badge badge-note">note展開可</span>' : '') +
      (post.editorCheck ? '<span class="badge badge-editor">editor確認推奨</span>' : '') +
      (post.reviewRequired ? '<span class="badge badge-review">要確認・未登録</span>' : '') +
      (post.typefullyId ? '<span class="badge badge-typefully">TF:' + esc(post.typefullyId) + '</span>' : '');

    var stBtns = ['採用', '修正', '保留'].map(function(s) {
      return '<button class="st-btn ' + (status === s ? 'on-' + s : '') + '" data-id="' + post.id + '" data-status="' + s + '">' + s + '</button>';
    }).join('');

    var isNoteDraft = post.category === 'note草稿';
    var bodyHtml = isNoteDraft
      ? '<textarea class="note-textarea" id="nta-' + post.id + '" readonly>' + esc(post.text) + '</textarea>' +
        '<div class="card-footer">' +
          '<button class="note-select-btn" data-id="' + post.id + '">全選択</button>' +
          '<div class="status-group">' + stBtns + '</div>' +
        '</div>'
      : '<div class="card-text">' + esc(post.text) + '</div>' +
        '<div class="card-footer">' +
          '<button class="copy-btn" data-id="' + post.id + '">コピー</button>' +
          '<div class="status-group">' + stBtns + '</div>' +
        '</div>';

    // 画像プロンプトセクション
    var imgPromptHtml = '';
    if (post.imagePrompt) {
      imgPromptHtml =
        '<div class="img-prompt-section">' +
          '<details class="img-prompt-section">' +
            '<summary>画像生成プロンプトを見る</summary>' +
            '<div class="img-prompt-body">' +
              '<textarea class="img-prompt-text" id="ipt-' + post.id + '" readonly>' + esc(post.imagePrompt) + '</textarea>' +
              '<button class="img-copy-btn" data-id="' + post.id + '">プロンプトをコピー</button>' +
            '</div>' +
          '</details>' +
        '</div>';
    }

    card.innerHTML =
      '<div class="card-top">' +
        '<div class="card-meta-top">' +
          '<span class="card-num">投稿' + post.id + '</span>' +
          '<span class="card-batch">' + esc(post.batch) + '</span>' +
          (post.scheduledLabel ? '<span class="card-scheduled">📅 ' + esc(post.scheduledLabel) + '</span>' : '') +
        '</div>' +
        '<div class="card-badges">' + badges + '</div>' +
      '</div>' +
      bodyHtml +
      '<div class="card-details">' +
        '<details>' +
          '<summary>想定読者・狙いを見る</summary>' +
          '<div class="meta-body">' +
            '<div class="meta-label">想定読者</div>' +
            '<div>' + esc(post.reader) + '</div>' +
            '<div class="meta-label">狙い</div>' +
            '<div>' + esc(post.intent) + '</div>' +
          '</div>' +
        '</details>' +
      '</div>' +
      imgPromptHtml;

    wrap.insertBefore(card, document.getElementById('emptyState'));
  });

  // コピー
  document.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var post = POSTS.find(function(p) { return p.id === +btn.dataset.id; });
      var doFallback = function() {
        var ta = document.createElement('textarea');
        ta.value = post.text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      };
      var showOk = function() {
        btn.textContent = 'コピーしました ✓';
        btn.classList.add('ok');
        setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('ok'); }, 2000);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(post.text).then(showOk).catch(function() { doFallback(); showOk(); });
      } else { doFallback(); showOk(); }
    });
  });

  // 画像プロンプトコピー
  document.querySelectorAll('.img-copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var post = POSTS.find(function(p) { return p.id === +btn.dataset.id; });
      var doFallback = function() {
        var ta = document.createElement('textarea');
        ta.value = post.imagePrompt;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      };
      var showOk = function() {
        btn.textContent = 'コピーしました ✓';
        btn.classList.add('ok');
        setTimeout(function() { btn.textContent = 'プロンプトをコピー'; btn.classList.remove('ok'); }, 2000);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(post.imagePrompt).then(showOk).catch(function() { doFallback(); showOk(); });
      } else { doFallback(); showOk(); }
    });
  });

  // note草稿 全選択
  document.querySelectorAll('.note-select-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var ta = document.getElementById('nta-' + btn.dataset.id);
      if (!ta) return;
      ta.focus();
      ta.select();
      btn.textContent = '選択中 — Ctrl+C でコピー';
      setTimeout(function() { btn.textContent = '全選択'; }, 3000);
    });
  });

  // ステータス
  document.querySelectorAll('.st-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = +btn.dataset.id;
      var s = btn.dataset.status;
      if (statuses[id] === s) { delete statuses[id]; } else { statuses[id] = s; }
      saveStatuses(statuses);
      btn.closest('.status-group').querySelectorAll('.st-btn').forEach(function(b) {
        b.className = 'st-btn' + (statuses[id] === b.dataset.status ? ' on-' + b.dataset.status : '');
      });
    });
  });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── 初期化 ────────────────────────────────────────────────
renderHeader();
renderCards();
renderFilters();
document.getElementById('searchInput').addEventListener('input', applyFilter);

document.getElementById('sortBtn').addEventListener('click', function() {
  sortByTime = !sortByTime;
  this.classList.toggle('on', sortByTime);
  this.textContent = sortByTime ? '🕐 時刻順（ON）' : '🕐 時刻順';
  renderCards();
  applyFilter();
});
</script>
